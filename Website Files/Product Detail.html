<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Detail — Woodwork Welders</title>
  <link rel="stylesheet" href="Woodwork.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="icon" href="download.ico">
</head>
<body>

<header class="site-header">
  <nav class="nav-wrap">
    <a href="Welcome Area.html" class="logo-link"><img src="Logo Image.jpeg" width="15%" height="15%"></a>
    <ul class="nav-links">
      <li><a href="Welcome Area.html">Home</a></li>
      <li><a href="Traditional Product Promotion.html">Promotions</a></li>
      <li><a href="Request-Return.html">Cart</a></li>
    </ul>
  </nav>
</header>

<nav class="heritage-nav">
  <a href="Welcome Area.html">Home</a>
  <span class="heritage-sep">/</span>
  <a href="Traditional Product Promotion.html">Promotions</a>
  <span class="heritage-sep">/</span>
  <span id="heritage-current">Product Detail</span>
</nav>

<main class="detail-container">
  <div class="image-section">
    <img id="p-image" src="" alt="Product" class="main-img">
    <div id="p-note" class="promo-status-note" style="display: none;"></div>
  </div>

  <div class="info-section">
    <h1 id="p-title" class="product-title">Loading Product...</h1>
    <div id="p-price" class="product-price"></div>
    <p id="p-desc" class="product-description"></p>
    
    <a id="p-heritage-link" href="#" class="btn-heritage" style="display:none;">Discover Its Heritage</a>
    
    <div class="cart-controls">
      <div class="qty-selector">
        <button type="button" class="qty-btn" id="minus-btn">-</button>
        <input type="number" id="qty" class="qty-input" value="1" min="1">
        <button type="button" class="qty-btn" id="plus-btn">+</button>
      </div>
      <button type="button" class="btn-add-cart">Add to Cart</button>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const products = {
  "mahogany-desk": {
    title: "Executive Mahogany Writing Desk",
    price: "$1,850.00",
    desc: "A centerpiece of craftsmanship. This desk features solid African Mahogany, hand-cut dovetail joints, and a premium leather inlay. The brass hardware is custom-forged for a heritage feel.",
    img: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&w=800&q=80"
  },
  "walnut-credenza": {
    title: "Mid-Century Walnut Sideboard",
    price: "$1,420.00",
    desc: "Clean lines meet rich textures. Built from American Black Walnut, this credenza offers grain-matched sliding doors and adjustable internal shelving for versatile storage.",
    img: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?auto=format&fit=crop&w=800&q=80"
  },
  "teak-lounge-chair": {
    title: "Danish Teak Lounge Chair",
    price: "$950.00",
    desc: "Inspired by mid-century Scandinavian design. The frame is Grade-A Teak, known for its durability and beautiful oil-finished hue, complemented by hand-woven cane.",
    img: "https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?auto=format&fit=crop&w=800&q=80"
  },
  "maple-console": {
    title: "Live Edge Maple Console",
    price: "$1,150.00",
    desc: "Modern industrial elegance. A single, live-edge slab of light Maple is preserved in its natural form, contrasted sharply against raw, powder-coated steel legs.",
    img: "https://images.unsplash.com/photo-1533090481720-856c6e3c1fdc?auto=format&fit=crop&w=800&q=80"
  },
    "coffee-table": {
      title: "Live Edge Oak Coffee Table",
      price: "$580.00",
      desc: "Preserving the natural silhouette of the oak tree with hand-welded steel legs.",
      img: "https://images.unsplash.com/photo-1554295405-abb8fd54f153?auto=format&fit=crop&w=800&q=80"
    },
    "bookshelf": {
      title: "Industrial Pipe Bookshelf",
      price: "$420.00",
      desc: "Blackened steel piping and reclaimed timber planks built for heavy-duty use.",
      img: "https://images.unsplash.com/photo-1594620302200-9a762244a156?auto=format&fit=crop&w=800&q=80"
    },
    "dining-table": {
      title: "Walnut Farmhouse Table",
      price: "$1,200.00",
      desc: "Solid American Walnut with traditional mortise and tenon joinery.",
      img: "https://images.unsplash.com/photo-1577140917170-285929fb55b7?auto=format&fit=crop&w=800&q=80"
    },
    "armchair": {
      title: "The Craftsman Armchair",
      price: "$340.00",
      desc: "Sculpted cherry wood with a minimalist ergonomic aesthetic.",
      img: "https://images.unsplash.com/photo-1592078615290-033ee584e267?auto=format&fit=crop&w=800&q=80"
    }
  };

  const query = new URLSearchParams(window.location.search);
  const productId = query.get('id');
  const status = query.get('status');

  // 1. POPULATE PAGE CONTENT
  if (productId && products[productId]) {
    const item = products[productId];
    document.getElementById('p-title').innerText = item.title;
    document.getElementById('heritage-current').innerText = item.title;
    document.getElementById('p-price').innerText = item.price;
    document.getElementById('p-desc').innerText = item.desc;
    document.getElementById('p-image').src = item.img;
    
    // Set the Heritage Link automatically
    const heritageLink = document.getElementById('p-heritage-link');
    heritageLink.href = `Heritage Profile.html?id=${productId}`;
    heritageLink.style.display = "inline-block";

    if (status) {
      const noteBox = document.getElementById('p-note');
      noteBox.innerText = "Special Promotion: " + status;
      noteBox.style.display = "block";
    }
  }

  // 2. QUANTITY LOGIC
  const qtyInput = document.getElementById('qty');
  document.getElementById('plus-btn').addEventListener('click', () => {
    qtyInput.value = parseInt(qtyInput.value) + 1;
  });
  document.getElementById('minus-btn').addEventListener('click', () => {
    if (parseInt(qtyInput.value) > 1) qtyInput.value = parseInt(qtyInput.value) - 1;
  });

  // 3. ADD TO CART LOGIC
  const addBtn = document.querySelector('.btn-add-cart');
  addBtn.addEventListener('click', function() {
    const qty = parseInt(qtyInput.value);
    const product = products[productId];

    if (!product) {
      alert("Error: Product not found.");
      return;
    }

    let cart = JSON.parse(localStorage.getItem('woodwork_cart')) || [];
    const existingIndex = cart.findIndex(item => item.id === productId);

    if (existingIndex > -1) {
      cart[existingIndex].quantity += qty;
    } else {
      cart.push({
        id: productId,
        title: product.title,
        price: product.price,
        img: product.img,
        quantity: qty
      });
    }

    localStorage.setItem('woodwork_cart', JSON.stringify(cart));
    alert(`${qty} x ${product.title} added to your cart!`);
  });
});
</script>

</body>
</html>
