<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Woodwork Welders</title>
  <link rel="stylesheet" href="Woodwork.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="download.ico">
</head>
<body>

<header class="site-header">
  <nav class="nav-wrap">
    <a href="Welcome Area.html" class="logo-link">
      <img src="Logo Image.jpeg" width="15%" height="15%" alt="Logo">
    </a>

    <ul class="nav-links">
      <li><a href="Make Your Own Wears.html">Bespoke</a></li>
      <li><a href="Traditional Product Promotion.html">Promotions</a></li>
      <li><a href="Heritage Profile.html">Heritage Profile</a></li>
    </ul>

    <div class="nav-right">
      <a href="Product Return.html" class="btn-cta">Product Return</a>
    </div>
  </nav>
</header>

<div class="page-header" style="text-align: center; padding: 40px 20px;">
  <h1>Your Cart</h1>
  <p>Review your selected handcrafted items before completing your order.</p>
</div>

<div class="divider" style="height: 1px; background: #eee; margin: 0 20px;"></div>

<section class="featured-section" style="padding: 40px 20px;">
  <div class="featured-inner" style="max-width: 1200px; margin: 0 auto;">

    <div id="cart-container" class="product-grid"></div>

    <div style="margin-top:40px; display:flex; justify-content:space-between; align-items:center; border-top: 2px solid #3a2e18; padding-top: 20px;">
      <h2 class="section-heading" style="margin:0">Total: £<span id="total">0</span></h2>
      <button class="btn-cta" style="padding: 15px 40px; cursor:pointer;" onclick="checkout()">Complete Checkout</button>
    </div>

  </div>
</section>

<script>
let cart = [];
const API_URL = 'Furniture Records.php'; 

function loadCart(){
  cart = JSON.parse(localStorage.getItem('woodwork_cart')) || [];
}

function saveCart(){
  localStorage.setItem('woodwork_cart', JSON.stringify(cart));
}

function parsePrice(priceStr) {
  if (typeof priceStr === 'number') return priceStr;
  return parseFloat(priceStr.replace(/[^0-9.]/g, '')) || 0;
}

/**
 * Step 2: Streamlined Checkout
 * Sends local cart data to the PHP/JSON backend
 */
async function checkout() {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  const checkoutBtn = document.querySelector('.btn-cta[onclick="checkout()"]');
  const originalText = checkoutBtn.textContent;
  checkoutBtn.textContent = "Processing...";
  checkoutBtn.disabled = true;

  const orderTotal = cart.reduce((sum, item) => sum + (parsePrice(item.price) * (parseInt(item.quantity, 10) || 1)), 0);

  const payload = {
    total: orderTotal,
    items: cart.map(item => ({
      product_id: item.id || 'Unknown',
      name: item.title,
      price: parsePrice(item.price),
      quantity: parseInt(item.quantity, 10) || 1
    }))
  };

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (data.success) {
      // Clear Cart
      cart = [];
      saveCart();
      
      // FINAL STEP REDIRECT: Go to Success Page with the Order ID
      window.location.href = "Order Success.html?id=" + data.order_id;
      
    } else {
      throw new Error(data.message || "Order failed to process.");
    }

  } catch (error) {
    console.error("Checkout Error:", error);
    alert("Checkout Error: " + error.message);
  } finally {
    checkoutBtn.textContent = originalText;
    checkoutBtn.disabled = false;
  }
}

// --- UI RENDERING ---

function renderCart(){
  const container = document.getElementById('cart-container');

  if(cart.length === 0){
    container.innerHTML = '<div style="text-align:center; padding: 50px;"><h3>Your cart is empty.</h3><p><a href="Traditional Product Promotion.html">Browse Promotions</a></p></div>';
    document.getElementById('total').textContent = "0.00";
    return;
  }

  container.innerHTML = cart.map(item => {
    const priceNum = parsePrice(item.price);
    const qtyNum = parseInt(item.quantity, 10) || 1;
    
    return `
      <div class="product-card" style="border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center;">
        <div class="product-img-wrap" style="width: 150px; height: 150px; flex-shrink: 0;">
          <img src="${item.img}" style="width:100%; height:100%; object-fit:cover; border-radius:4px;">
        </div>

        <div class="product-body" style="flex-grow: 1;">
          <h3 style="margin-top:0;">${item.title}</h3>
          <p style="color: #666;">Unit Price: £${priceNum.toFixed(2)}</p>
          <p>Quantity: <strong>${qtyNum}</strong></p>
        </div>

        <div class="product-footer" style="text-align: right; min-width: 150px;">
          <div class="product-price" style="font-weight:bold; font-size:22px; color: #7a5e28; margin-bottom: 10px;">
            £${(priceNum * qtyNum).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
          </div>
          <div style="display:flex; gap:6px; justify-content: flex-end;">
            <button class="btn-view-product" style="padding: 5px 12px; cursor:pointer;" onclick="updateQty('${item.id}', -1)">-</button>
            <button class="btn-view-product" style="padding: 5px 12px; cursor:pointer;" onclick="updateQty('${item.id}', 1)">+</button>
            <button class="btn-view-product" style="padding: 5px 12px; cursor:pointer; background: #944; color: white; border: none; border-radius: 4px;" onclick="removeItem('${item.id}')">Remove</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const total = cart.reduce((sum, item) => sum + (parsePrice(item.price) * (parseInt(item.quantity, 10) || 1)), 0);
  document.getElementById('total').textContent = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function updateQty(id, delta){
  cart = cart.map(item => {
    if(item.id === id){
      const currentQty = parseInt(item.quantity, 10) || 1;
      const newQty = currentQty + delta;
      return {...item, quantity: newQty > 0 ? newQty : 1};
    }
    return item;
  });
  saveCart();
  renderCart();
}

function removeItem(id){
  cart = cart.filter(item => item.id !== id);
  saveCart();
  renderCart();
}

loadCart();
renderCart();
</script>

</body>
</html>
