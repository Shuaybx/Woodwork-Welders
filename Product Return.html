<div class="page">

  <div class="page-head">
    <h1>Product Returns</h1>
    <p>Viewing purchase history from the orders database for review.</p>
  </div>

  <div class="stats-row">
    <div class="stat-cell"><span class="stat-num" id="s-tot">0</span><span class="stat-lbl">Total Items</span></div>
    <div class="stat-cell"><span class="stat-num" id="s-pend">0</span><span class="stat-lbl">Pending Review</span></div>
    <div class="stat-cell"><span class="stat-num" id="s-val">£0</span><span class="stat-lbl">Total Value</span></div>
  </div>

  <div id="container"></div>

</div>

<div class="toasts" id="toasts"></div>

<script>
let items = [];

async function loadReturns() {
    try {
        const response = await fetch('get_returns.php');
        
        if (!response.ok) {
            items = [];
            renderCards();
            return;
        }

        const returnsData = await response.json();
    
        items = [];
        returnsData.forEach(ret => {
            ret.items.forEach(product => {
                items.push({
                    return_id: ret.return_id, // Internal Database ID for the return
                    order_ref: ret.order_ref,
                    ref_code: ret.ref_code,
                    reason: ret.reason,
                    name: product.name,
                    price: parseFloat(product.price),
                    qty: parseInt(product.quantity),
                    date: ret.date,
                    status: ret.status
                });
            });
        });

        renderCards();
    } catch (error) {
        console.error("Error loading returns database:", error);
        items = [];
        renderCards();
    }
}

function renderCards() {
    const cont = document.getElementById('container');

    document.getElementById('s-tot').textContent = items.length;
    document.getElementById('s-pend').textContent = items.length; 
    const totalValue = items.reduce((a, i) => a + (i.price * i.qty), 0);
    document.getElementById('s-val').textContent = '£' + totalValue.toLocaleString(undefined, {minimumFractionDigits: 2});

    if (!items.length) {
        cont.innerHTML = `<div class="empty" style="text-align:center; padding: 40px;"><h2>No Pending Returns</h2><p>All clear! No items require review.</p></div>`;
        return;
    }

    cont.innerHTML = `<div class="cards-grid">${items.map(item => `
        <div class="ret-card" id="card-${item.return_id}" style="border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
            <div class="card-body">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <h3 style="margin-top:0;">${item.name}</h3>
                    <span class="cat-tag" style="background:#f4f1ea; padding: 5px 10px; font-size: 14px; border-radius: 4px; color:#3a2e18;">Order: ${item.order_ref}</span>
                </div>
                <div class="card-meta" style="margin-bottom: 10px;">
                    <span class="card-price" style="font-weight: bold;">£${item.price.toFixed(2)}</span> | 
                    <span class="card-sku">Qty: ${item.qty}</span>
                </div>
                
                <div style="background: #f9f9f9; padding: 10px; border-left: 4px solid #7a5e28; margin-bottom: 15px;">
                    <strong>Reason for return:</strong> ${item.reason}
                </div>

                <div class="card-date" style="font-size: 13px; color: #666; margin-bottom: 15px;">Submitted: ${item.date}</div>
            </div>
            <div class="card-foot" style="display: flex; gap: 10px;">
                <button onclick="processReturn(${item.return_id}, 'approve')" style="padding: 10px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px;">Approve Return</button>
                <button onclick="processReturn(${item.return_id}, 'reject')" style="padding: 10px 15px; cursor: pointer; background: #dc3545; color: white; border: none; border-radius: 4px;">Reject</button>
            </div>
        </div>
    `).join('')}</div>`;
}

// Function to handle database updates
async function processReturn(returnId, actionType) {
    const card = document.getElementById(`card-${returnId}`);
    
    // Disable buttons temporarily
    const buttons = card.querySelectorAll('button');
    buttons.forEach(btn => btn.disabled = true);

    try {
        const response = await fetch('process_return.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ return_id: returnId, action: actionType })
        });

        const data = await response.json();

        if (data.success) {
            if (actionType === 'approve') {
                card.style.opacity = '0.5';
                card.style.border = '2px solid #28a745';
                toast('Return Request Approved');
            } else {
                card.style.opacity = '0.5';
                card.style.border = '2px solid #dc3545';
                toast('Return Request Rejected');
            }
            card.style.pointerEvents = 'none'; // Prevent further clicks
            
            let pendingCount = parseInt(document.getElementById('s-pend').textContent);
            document.getElementById('s-pend').textContent = pendingCount > 0 ? pendingCount - 1 : 0;

        } else {
            throw new Error(data.message || "Failed to update database.");
        }
    } catch (error) {
        console.error("Processing Error:", error);
        toast("Error: Could not process return.");
        buttons.forEach(btn => btn.disabled = false); // Re-enable if it failed
    }
}

function toast(msg) {
    const w = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    
    // Basic inline styling for the toast in case the CSS is missing
    el.style.position = 'fixed';
    el.style.bottom = '20px';
    el.style.right = '20px';
    el.style.background = '#333';
    el.style.color = '#fff';
    el.style.padding = '10px 20px';
    el.style.borderRadius = '4px';
    el.style.zIndex = '1000';
    
    w.appendChild(el);
    setTimeout(() => el.remove(), 2500);
}

loadReturns();
</script>
